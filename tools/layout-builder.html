<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QHTML7 Layout Builder</title>
  <link rel="icon" href="data:,">
  <script src="q-editor.js"></script>
  <script src="../dist/qhtml.js"></script>
  <style>
    :root {
      color-scheme: light;
      --lb-bg: #eef2f7;
      --lb-panel: #ffffff;
      --lb-line: #cbd5e1;
      --lb-line-soft: #e2e8f0;
      --lb-text: #0f172a;
      --lb-muted: #64748b;
      --lb-active: #2563eb;
      --lb-danger: #b91c1c;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--lb-bg);
      color: var(--lb-text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .lb-preview-host {
      display: block;
      min-width: 75vw;
      min-height: 75vh;
    }

    .lb-preview-host q-html7,
    .lb-preview-host q-html {
      display: block;
      width: 100%;
      min-height: 75vh;
    }

    .lb-preview-host [qhtml-layout] {
      outline: 1px solid rgba(148, 163, 184, 0.72);
      outline-offset: -1px;
      transition: outline-color 120ms ease, outline-width 120ms ease, background-color 120ms ease;
    }

    .lb-preview-host [data-lb-active="1"] {
      outline: 3px solid var(--lb-active);
      outline-offset: -3px;
      background-color: rgba(37, 99, 235, 0.04);
    }

    .lb-preview-host [data-lb-drop="1"] {
      outline: 3px dashed #10b981;
      outline-offset: -3px;
      background-color: rgba(16, 185, 129, 0.08);
    }

    .lb-context-menu,
    .lb-submenu {
      position: fixed;
      z-index: 1000;
      min-width: 168px;
      padding: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
    }

    .lb-context-menu[hidden],
    .lb-submenu[hidden] {
      display: none;
    }

    .lb-menu-item {
      width: 100%;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #0f172a;
      padding: 0 10px;
      text-align: left;
      cursor: pointer;
    }

    .lb-menu-item:hover,
    .lb-menu-item:focus-visible {
      background: #eff6ff;
      outline: none;
    }

    .lb-menu-item.lb-danger {
      color: var(--lb-danger);
    }

    .lb-menu-separator {
      height: 1px;
      margin: 6px 4px;
      background: #e2e8f0;
    }

    .lb-chevron {
      color: #64748b;
      font-size: 12px;
    }

    dialog.lb-dialog {
      width: min(980px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.26);
    }

    dialog.lb-dialog::backdrop {
      background: rgba(15, 23, 42, 0.42);
    }

    .lb-dialog-header,
    .lb-dialog-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .lb-dialog-actions {
      justify-content: flex-end;
      border-top: 1px solid #e2e8f0;
      border-bottom: 0;
    }

    .lb-dialog-title {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
    }

    .lb-dialog-body {
      padding: 16px;
      background: #ffffff;
    }

    .lb-dialog q-editor {
      min-height: 54vh;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      overflow: hidden;
    }

    .lb-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .lb-field {
      display: grid;
      gap: 6px;
    }

    .lb-field label {
      color: #475569;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .lb-field input,
    .lb-field select {
      min-height: 38px;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0 10px;
      background: #ffffff;
      color: #0f172a;
    }

    .lb-button {
      min-height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: #0f172a;
      padding: 0 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .lb-button:hover {
      background: #f8fafc;
    }

    .lb-button.primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #ffffff;
    }

    .lb-button.danger {
      border-color: #fecaca;
      color: var(--lb-danger);
    }
  </style>
</head>
<body>
  <q-html version="7">
q-import { ./layout-builder/main.qhtml }
  </q-html>
  <script src="layout-builder/main.js"></script>
</body>
</html>
