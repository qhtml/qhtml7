<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Particle Emitter Editor</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(15, 23, 42, 0.96);
      --surface-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.28);
      --accent: #22c55e;
      --shadow: 0 3vh 9vh rgba(0, 0, 0, 0.42);
      --radius: 1.4vw;
      --stage-w: 70vw;
      --stage-h: 70vh;
      --sidebar-w: 20vw;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(34, 197, 94, 0.16), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.14), transparent 26%),
        linear-gradient(135deg, #020617, var(--bg));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: clamp(14px, 0.95vw, 18px);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(17rem, var(--sidebar-w)) 1fr;
      gap: 1.2vw;
      padding: 1.2vw;
    }

    .sidebar {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 1vh;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar-head {
      display: grid;
      gap: 0.6vh;
      padding: 1.2vw;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.13), transparent);
    }

    .title {
      margin: 0;
      font-size: clamp(1.15rem, 1.35vw, 1.6rem);
      font-weight: 900;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.85rem, 0.85vw, 1rem);
      line-height: 1.45;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7vw;
      padding: 0 1.2vw;
    }

    .tool-btn,
    .dialog-btn {
      min-height: 5vh;
      border: 1px solid var(--line);
      border-radius: 0.75vw;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5vw;
    }

    .tool-btn.primary,
    .dialog-btn.primary {
      background: var(--accent);
      color: #04130a;
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 1.4vh 4vh rgba(34, 197, 94, 0.24);
    }

    .dialog-btn.danger {
      background: rgba(239, 68, 68, 0.18);
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.5);
      margin-right: auto;
    }

    .emitter-list-wrap {
      min-height: 0;
      padding: 0 1.2vw 1.2vw;
      overflow: auto;
    }

    .emitter-list-label {
      margin: 0 0 0.7vh;
      color: var(--muted);
      font-size: clamp(0.75rem, 0.75vw, 0.9rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .emitter-list {
      display: flex;
      flex-wrap: wrap;
      align-content: start;
      gap: 0.55vw;
    }

    .emitter-chip {
      min-height: 4.2vh;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      padding: 0 0.8vw;
      font-size: clamp(0.82rem, 0.82vw, 1rem);
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 0.5vw;
    }

    .emitter-chip.is-selected {
      color: #04130a;
      background: var(--accent);
      border-color: transparent;
    }

    .emitter-chip .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.75;
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 1.2vw;
    }

    .stage-shell {
      display: grid;
      gap: 1vh;
    }

    .stage-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1vw;
      color: var(--muted);
      font-size: clamp(0.85rem, 0.85vw, 1rem);
    }

    .stage-label strong {
      color: var(--text);
    }

    #particle-stage {
      position: relative;
      width: var(--stage-w);
      height: var(--stage-h);
      min-width: 32vw;
      min-height: 42vh;
      overflow: hidden;
      border-radius: 1.8vw;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        radial-gradient(circle at 50% 100%, rgba(34, 197, 94, 0.16), transparent 45%),
        linear-gradient(180deg, #020617, #0f172a);
      background-size: 2vw 2vw, 2vw 2vw, 100% 100%, 100% 100%;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 3vh 9vh rgba(0, 0, 0, 0.38);
    }

    .stage-empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      color: rgba(226, 232, 240, 0.4);
      font-weight: 800;
      text-align: center;
      padding: 2vw;
    }

    #particle-stage.has-emitters .stage-empty {
      display: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      place-items: center;
      background: rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(1vw);
      padding: 2vh 2vw;
    }

    .modal-backdrop.is-open {
      display: grid;
    }

    .dialog {
      width: min(94vw, 88rem);
      height: min(92vh, 58rem);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border-radius: 1.5vw;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .dialog.small {
      width: min(84vw, 70rem);
      height: min(82vh, 46rem);
    }

    .dialog form {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1vw;
      padding: 1.2vh 1.4vw;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent);
    }

    .dialog-title {
      margin: 0;
      font-size: clamp(1.15rem, 1.35vw, 1.65rem);
    }

    .x-btn {
      width: 2.7rem;
      height: 2.7rem;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 0.8vw;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      font-size: 1.6rem;
      line-height: 1;
    }

    .dialog-body {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1.2vw;
      overscroll-behavior: contain;
    }

    .dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75vw;
      padding: 1vh 1.4vw;
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .form-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 1vw;
    }

    .field-group {
      border: 1px solid var(--line);
      border-radius: 0.8vw;
      padding: 1vw;
      background: rgba(15, 23, 42, 0.6);
      display: flex;
      flex-direction: column;
      gap: 0.75vh;
      flex: 1 1 clamp(18rem, 25vw, 30rem);
    }

    .field-group.double,
    .field-group.full {
      flex-basis: clamp(26rem, 38vw, 48rem);
    }

    .group-title {
      margin: 0;
      color: #dbeafe;
      font-size: clamp(0.86rem, 0.9vw, 1.05rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 0.8vw;
    }

    .field-row label {
      flex: 0 0 42%;
      color: var(--muted);
      font-size: clamp(0.86rem, 0.9vw, 1.05rem);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .field-row input,
    .field-row select,
    .field-row textarea {
      width: 100%;
      min-height: 4.4vh;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 0.65vw;
      background: rgba(2, 6, 23, 0.74);
      color: var(--text);
      padding: 0.7vh 0.8vw;
      outline: none;
    }

    .field-row input[type="checkbox"] {
      width: auto;
      min-height: auto;
      transform: scale(1.15);
    }

    .field-row input[type="color"] {
      padding: 0.25rem;
      height: 4.4vh;
    }

    .field-row input:focus,
    .field-row textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 0.25rem rgba(34, 197, 94, 0.14);
    }

    .src-row input {
      min-width: 0;
    }

    .file-btn {
      min-height: 4.4vh;
      padding: 0 0.8vw;
      border-radius: 0.65vw;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      font-weight: 800;
      white-space: nowrap;
    }

    .hidden-file {
      display: none;
    }

    .export-textarea {
      width: 100%;
      height: min(60vh, 38rem);
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 0.9vw;
      background: #020617;
      color: #d1fae5;
      padding: 1vw;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.85rem, 0.82vw, 1rem);
      line-height: 1.45;
      outline: none;
      white-space: pre;
      overflow: auto;
    }

    .export-options {
      display: grid;
      gap: 0.8vh;
      margin-top: 1vh;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 0.7vw;
      color: var(--muted);
      font-size: clamp(0.9rem, 0.9vw, 1.05rem);
      font-weight: 800;
    }

    .option-row input {
      transform: scale(1.1);
    }

    .copy-icon {
      width: 1.2rem;
      height: 1.2rem;
      display: block;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 2.4vh;
      z-index: 20000;
      transform: translateX(-50%) translateY(2vh);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      padding: 1vh 1vw;
      border-radius: 999px;
      background: var(--accent);
      color: #04130a;
      font-weight: 900;
      box-shadow: 0 1.5vh 4vh rgba(0, 0, 0, 0.35);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      html,
      body {
        overflow: auto;
      }

      :root {
        --sidebar-w: 100vw;
        --stage-w: 92vw;
        --stage-h: 62vh;
      }

      .app {
        min-height: 100%;
        grid-template-columns: 1fr;
        padding: 2vw;
      }

      .workspace {
        overflow: visible;
      }

      #particle-stage {
        min-width: 0;
      }

      .dialog,
      .dialog.small {
        width: 96vw;
        height: 92vh;
        border-radius: 3vw;
      }

      .form-grid {
        gap: 1.5vh;
      }

      .field-group,
      .field-group.double,
      .field-group.full {
        flex-basis: 100%;
        border-radius: 2vw;
        padding: 2.2vw;
      }

      .field-row {
        flex-direction: column;
        align-items: stretch;
      }

      .field-row label {
        flex-basis: auto;
      }
    }
  </style>
<script src="../../dist/qhtml-wasm.js"></script>
<script src="../../dist/particle-emitter.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-head"><h1 class="title">Particle Editor</h1><p class="subtitle">Create, tune, import sprite images, and export live <code>particle-emitter</code> markup.</p></header>
      <div class="toolbar"><button id="new-emitter-btn" class="tool-btn primary" type="button">New Emitter</button><button id="export-btn" class="tool-btn" type="button">Export</button></div>
      <section class="emitter-list-wrap"><p class="emitter-list-label">Emitters</p><div id="emitter-list" class="emitter-list"></div></section>
    </aside>
    <main class="workspace"><section class="stage-shell"><div class="stage-label"><strong>Live Stage</strong><span>70vw × 70vh preview container</span></div><div id="particle-stage" aria-label="particle preview stage"><div class="stage-empty">Create an emitter to start previewing particles.</div></div></section></main>
  </div>
  <div id="editor-modal" class="modal-backdrop" aria-hidden="true"><section class="dialog" role="dialog" aria-modal="true" aria-labelledby="editor-title"><header class="dialog-header"><h2 id="editor-title" class="dialog-title">Emitter</h2><button class="x-btn" data-close="editor" type="button" aria-label="Close">×</button></header><form id="emitter-form"><div class="dialog-body"><div id="form-fields" class="form-grid"></div><input id="sprite-file" class="hidden-file" type="file" accept="image/*"></div><footer class="dialog-footer"><button id="delete-emitter-btn" class="dialog-btn danger" type="button">Delete</button><button class="dialog-btn" data-close="editor" type="button">Cancel</button><button class="dialog-btn primary" type="submit">Apply</button></footer></form></section></div>
  <div id="export-modal" class="modal-backdrop" aria-hidden="true"><section class="dialog small" role="dialog" aria-modal="true" aria-labelledby="export-title"><header class="dialog-header"><h2 id="export-title" class="dialog-title">Export Particle Emitters</h2><button class="x-btn" data-close="export" type="button" aria-label="Close">×</button></header><div class="dialog-body"><textarea id="export-text" class="export-textarea" spellcheck="false"></textarea><div class="export-options"><label class="option-row"><input id="export-wrap-qhtml" type="checkbox" checked>Include &lt;q-html&gt; wrapper</label><label class="option-row"><input id="export-include-container" type="checkbox" checked>Include parent div container</label></div></div><footer class="dialog-footer"><button id="copy-export-btn" class="dialog-btn primary" type="button" title="Copy to clipboard"><svg class="copy-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h10v12H8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path><path d="M6 16H4V4h12v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>Copy</button><button class="dialog-btn" data-close="export" type="button">Close</button></footer></section></div>
  <div id="toast" class="toast">Copied</div>
  <script>
    (function(){"use strict";
      const DEFAULT_PARTICLE_SRC="assets/particle.png";
      const FIELD_GROUPS=[
        {title:"Identity",className:"field-group",fields:[{attr:"emitter-name",label:"Name",type:"text",value:"Emitter"},{attr:"id",label:"Element ID",type:"text",value:""},{attr:"running",label:"Running",type:"checkbox",value:"true"},{attr:"qhtml-unsynced",label:"QHTML Unsynced",type:"text",value:"1"}]},
        {title:"Sprite / Image",className:"field-group double",fields:[{attr:"src",label:"Image src",type:"src",value:DEFAULT_PARTICLE_SRC},{attr:"mask",label:"Sprite mask",type:"src",value:""},{attr:"emitter-mask",label:"Emitter mask",type:"src",value:""},{attr:"color",label:"Tint Color",type:"color",value:"#08c473"},{attr:"color-opacity",label:"Tint Opacity",type:"number",value:"0.28",step:"0.01",min:"0",max:"1"}]},
        {title:"Emission",className:"field-group",fields:[{attr:"emitrate",label:"Emit Rate",type:"number",value:"74",step:"1"},{attr:"interval",label:"Interval",type:"number",value:"10",step:"1"},{attr:"maxactiveparticles",label:"Max Active",type:"number",value:"166",step:"1"},{attr:"maxactiveparticlesvariation",label:"Max Active Variation",type:"number",value:"18",step:"1"}]},
        {title:"Lifetime",className:"field-group",fields:[{attr:"lifetime",label:"Lifetime",type:"number",value:"700",step:"1"},{attr:"lifetimevariation",label:"Lifetime Variation",type:"number",value:"90",step:"1"}]},
        {title:"Position",className:"field-group",fields:[{attr:"x",label:"X",type:"number",value:"110",step:"1"},{attr:"y",label:"Y",type:"number",value:"114",step:"1"},{attr:"width",label:"Emitter Width",type:"number",value:"0",step:"1",min:"0"},{attr:"height",label:"Emitter Height",type:"number",value:"0",step:"1",min:"0"},{attr:"xvariation",label:"X Variation",type:"number",value:"845",step:"1"},{attr:"yvariation",label:"Y Variation",type:"number",value:"20",step:"1"}]},
        {title:"Velocity",className:"field-group",fields:[{attr:"xvelocity",label:"X Velocity",type:"number",value:"0",step:"0.01"},{attr:"yvelocity",label:"Y Velocity",type:"number",value:"-1.75",step:"0.01"},{attr:"xvelocityvariation",label:"X Velocity Variation",type:"number",value:"0",step:"0.01"},{attr:"yvelocityvariation",label:"Y Velocity Variation",type:"number",value:"0.04",step:"0.01"}]},
        {title:"Acceleration",className:"field-group",fields:[{attr:"xacceleration",label:"X Acceleration",type:"number",value:"0",step:"0.0001"},{attr:"yacceleration",label:"Y Acceleration",type:"number",value:"0.0028",step:"0.0001"},{attr:"xaccelerationvariation",label:"X Accel Variation",type:"number",value:"0",step:"0.0001"},{attr:"yaccelerationvariation",label:"Y Accel Variation",type:"number",value:"0.005",step:"0.0001"}]},
        {title:"Size",className:"field-group",fields:[{attr:"startsize",label:"Start Size",type:"number",value:"25",step:"1"},{attr:"endsize",label:"End Size",type:"number",value:"1",step:"1"},{attr:"startsizevariation",label:"Start Size Variation",type:"number",value:"7",step:"1"},{attr:"endsizevariation",label:"End Size Variation",type:"number",value:"5",step:"1"}]},
        {title:"Opacity",className:"field-group",fields:[{attr:"startopacity",label:"Start Opacity",type:"number",value:"0.5",step:"0.01",min:"0",max:"1"},{attr:"endopacity",label:"End Opacity",type:"number",value:"0.02",step:"0.01",min:"0",max:"1"},{attr:"startopacityvariation",label:"Start Opacity Variation",type:"number",value:"0.16",step:"0.01",min:"0",max:"1"},{attr:"endopacityvariation",label:"End Opacity Variation",type:"number",value:"0.02",step:"0.01",min:"0",max:"1"}]},
        {title:"Element Style",className:"field-group full",fields:[{attr:"style",label:"Style",type:"textarea",value:"position: absolute; inset: 0px; display: block; pointer-events: none; overflow: hidden; z-index: 1;"}]}
      ];
      const EXPORT_ATTR_NAMES={
        id:"id",running:"running",src:"src",mask:"mask","emitter-mask":"emitterMask",color:"color","color-opacity":"colorOpacity",style:"style",
        emitrate:"emitRate",interval:"interval",maxactiveparticles:"maxActiveParticles",maxactiveparticlesvariation:"maxActiveParticlesVariation",
        lifetime:"lifetime",lifetimevariation:"lifetimeVariation",
        x:"x",y:"y",width:"width",height:"height",xvariation:"xVariation",yvariation:"yVariation",
        xvelocity:"xVelocity",yvelocity:"yVelocity",xvelocityvariation:"xVelocityVariation",yvelocityvariation:"yVelocityVariation",
        xacceleration:"xAcceleration",yacceleration:"yAcceleration",xaccelerationvariation:"xAccelerationVariation",yaccelerationvariation:"yAccelerationVariation",
        startsize:"startSize",endsize:"endSize",startsizevariation:"startSizeVariation",endsizevariation:"endSizeVariation",
        startopacity:"startOpacity",endopacity:"endOpacity",startopacityvariation:"startOpacityVariation",endopacityvariation:"endOpacityVariation"
      };
      class Dom{static byId(id){return document.getElementById(id)}static el(tagName,attrs,children){const node=document.createElement(tagName);Object.entries(attrs||{}).forEach(([key,value])=>{if(key==="className")node.className=value;else if(key==="text")node.textContent=value;else if(key.startsWith("on")&&typeof value==="function")node.addEventListener(key.slice(2).toLowerCase(),value);else if(value!==null&&value!==undefined)node.setAttribute(key,String(value))});(children||[]).forEach(child=>{if(child===null||child===undefined)return;node.appendChild(typeof child==="string"?document.createTextNode(child):child)});return node}}
      class Toast{constructor(node){this.node=node;this.timer=0}show(message){this.node.textContent=message;this.node.classList.add("show");clearTimeout(this.timer);this.timer=setTimeout(()=>this.node.classList.remove("show"),1400)}}
      class Modal{constructor(node){this.node=node;this.node.querySelectorAll("[data-close]").forEach(button=>button.addEventListener("click",()=>this.close()));this.node.addEventListener("pointerdown",event=>{if(event.target===this.node)this.close()})}open(){this.node.classList.add("is-open");this.node.setAttribute("aria-hidden","false")}close(){this.node.classList.remove("is-open");this.node.setAttribute("aria-hidden","true")}}
      class FieldRegistry{constructor(groups){this.groups=groups;this.fields=groups.flatMap(group=>group.fields);this.byAttr=new Map(this.fields.map(field=>[field.attr,field]))}defaults(){const result=Object.create(null);this.fields.forEach(field=>{result[field.attr]=field.value});return result}attrs(){return this.fields.map(field=>field.attr)}}
      class ParticleEmitterFactory{constructor(registry){this.registry=registry;this.counter=0}nextName(){this.counter+=1;return `emitterName${this.counter}`}nextId(){return `particle-emitter-${Date.now()}-${this.counter+1}`}create(attrs){const emitter=document.createElement("particle-emitter");const data=Object.assign(this.registry.defaults(),attrs||{});if(!data["emitter-name"]||data["emitter-name"]==="Emitter")data["emitter-name"]=this.nextName();if(!data.id)data.id=this.nextId();this.apply(emitter,data);return emitter}read(emitter){const data=this.registry.defaults();this.registry.attrs().forEach(attr=>{if(emitter.hasAttribute(attr))data[attr]=emitter.getAttribute(attr)});return data}apply(emitter,data){this.registry.attrs().forEach(attr=>{const value=data[attr];if(value===null||value===undefined||value===""){if(attr!=="emitter-name"&&attr!=="id")emitter.removeAttribute(attr);return}emitter.setAttribute(attr,String(value))})}}
      class EmitterList{constructor(node,editor){this.node=node;this.editor=editor;this.selected=null}select(emitter){this.selected=emitter;this.render()}render(){const emitters=this.editor.emitters();this.node.innerHTML="";emitters.forEach(emitter=>{const chip=Dom.el("button",{className:"emitter-chip"+(emitter===this.selected?" is-selected":""),type:"button",onClick:()=>{this.select(emitter);this.editor.openEditor(emitter)}},[Dom.el("span",{className:"dot"}),Dom.el("span",{text:emitter.getAttribute("emitter-name")||emitter.id||"Emitter"})]);this.node.appendChild(chip)})}}
      class EmitterForm{constructor(node,registry,factory,editor){this.node=node;this.registry=registry;this.factory=factory;this.editor=editor;this.currentEmitter=null;this.mode="create";this.inputs=new Map();this.pendingFileAttr="src";this.fieldsNode=Dom.byId("form-fields");this.fileInput=Dom.byId("sprite-file");this.deleteButton=Dom.byId("delete-emitter-btn");this.build();this.node.addEventListener("submit",event=>{event.preventDefault();this.commit()});this.node.addEventListener("input",event=>{const input=event.target.closest("[data-attr]");if(!input||!this.currentEmitter)return;this.applyLive()});this.fileInput.addEventListener("change",()=>this.importImage());this.deleteButton.addEventListener("click",()=>this.deleteCurrent())}build(){this.fieldsNode.innerHTML="";this.registry.groups.forEach(group=>{const groupNode=Dom.el("fieldset",{className:group.className},[Dom.el("legend",{className:"group-title",text:group.title})]);group.fields.forEach(field=>groupNode.appendChild(this.createField(field)));this.fieldsNode.appendChild(groupNode)})}createField(field){const id=`field-${field.attr}`;let input;if(field.type==="textarea"){input=Dom.el("textarea",{id,"data-attr":field.attr,rows:"3"})}else if(field.type==="checkbox"){input=Dom.el("input",{id,"data-attr":field.attr,type:"checkbox"})}else if(field.type==="src"){input=Dom.el("input",{id,"data-attr":field.attr,type:"text"});const browse=Dom.el("button",{type:"button",className:"file-btn",text:"Browse",onClick:()=>{this.pendingFileAttr=field.attr;this.fileInput.click()}});const row=Dom.el("div",{className:"field-row src-row"},[Dom.el("label",{for:id,text:field.label}),input,browse]);this.inputs.set(field.attr,input);return row}else{input=Dom.el("input",{id,"data-attr":field.attr,type:field.type||"text",step:field.step,min:field.min,max:field.max})}this.inputs.set(field.attr,input);return Dom.el("div",{className:"field-row"},[Dom.el("label",{for:id,text:field.label}),input])}load(emitter,mode){const data=this.factory.read(emitter);this.currentEmitter=emitter;this.mode=mode||"edit";this.inputs.forEach((input,attr)=>{const field=this.registry.byAttr.get(attr);const value=data[attr]??field.value??"";if(input.type==="checkbox")input.checked=value===true||value==="true"||value==="1";else input.value=value});Dom.byId("editor-title").textContent=this.mode==="create"?"New Particle Emitter":"Edit Particle Emitter";this.deleteButton.style.display=this.currentEmitter?"inline-flex":"none"}values(){const data=Object.create(null);this.inputs.forEach((input,attr)=>{data[attr]=input.type==="checkbox"?(input.checked?"true":"false"):input.value});return data}applyLive(){if(!this.currentEmitter)return;this.factory.apply(this.currentEmitter,this.values());this.editor.afterEmitterChanged(this.currentEmitter)}commit(){this.applyLive();this.editor.editorModal.close()}deleteCurrent(){if(!this.currentEmitter)return;this.currentEmitter.remove();this.currentEmitter=null;this.editor.afterEmitterDeleted();this.editor.editorModal.close()}importImage(){const file=this.fileInput.files&&this.fileInput.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{const targetInput=this.inputs.get(this.pendingFileAttr||"src");targetInput.value=String(reader.result||"");this.applyLive();this.fileInput.value=""};reader.readAsDataURL(file)}}
      class Exporter{constructor(editor,modal,textarea,toast){this.editor=editor;this.modal=modal;this.textarea=textarea;this.toast=toast;this.wrapQHtml=Dom.byId("export-wrap-qhtml");this.includeContainer=Dom.byId("export-include-container");this.wrapQHtml.addEventListener("change",()=>this.refresh());this.includeContainer.addEventListener("change",()=>this.refresh())}open(){this.refresh();this.modal.open();this.textarea.focus();this.textarea.select()}refresh(){this.textarea.value=this.editor.exportQHtml({wrapQHtml:this.wrapQHtml.checked,includeContainer:this.includeContainer.checked})}async copy(){this.refresh();const value=this.textarea.value;try{await navigator.clipboard.writeText(value);this.toast.show("Copied export markup")}catch(error){this.textarea.focus();this.textarea.select();document.execCommand("copy");this.toast.show("Copied export markup")}}}
      class ParticleEditor{constructor(){this.stage=Dom.byId("particle-stage");this.registry=new FieldRegistry(FIELD_GROUPS);this.factory=new ParticleEmitterFactory(this.registry);this.editorModal=new Modal(Dom.byId("editor-modal"));this.exportModal=new Modal(Dom.byId("export-modal"));this.toast=new Toast(Dom.byId("toast"));this.list=new EmitterList(Dom.byId("emitter-list"),this);this.form=new EmitterForm(Dom.byId("emitter-form"),this.registry,this.factory,this);this.exporter=new Exporter(this,this.exportModal,Dom.byId("export-text"),this.toast);Dom.byId("new-emitter-btn").addEventListener("click",()=>this.newEmitter());Dom.byId("export-btn").addEventListener("click",()=>this.exporter.open());Dom.byId("copy-export-btn").addEventListener("click",()=>this.exporter.copy());this.list.render();this.refreshStageState()}emitters(){return Array.from(this.stage.querySelectorAll(":scope > particle-emitter"))}newEmitter(){const emitter=this.factory.create();this.stage.appendChild(emitter);this.list.select(emitter);this.form.load(emitter,"create");this.editorModal.open();this.afterEmitterChanged(emitter)}openEditor(emitter){this.list.select(emitter);this.form.load(emitter,"edit");this.editorModal.open()}afterEmitterChanged(emitter){this.refreshStageState();this.list.select(emitter);this.list.render();this.exporter.refresh()}afterEmitterDeleted(){this.refreshStageState();this.list.select(null);this.list.render();this.exporter.refresh()}refreshStageState(){this.stage.classList.toggle("has-emitters",this.emitters().length>0)}exportQHtml(options){const settings=Object.assign({wrapQHtml:true,includeContainer:false},options||{});const emitterBlocks=this.emitters().map(emitter=>this.formatEmitterQHtml(emitter));const bodyLines=[];if(settings.includeContainer){bodyLines.push(this.formatContainerStart());emitterBlocks.forEach(block=>block.split("\n").forEach(line=>bodyLines.push(`  ${line}`)));bodyLines.push("}")}else{emitterBlocks.forEach(block=>block.split("\n").forEach(line=>bodyLines.push(line)))}const body=bodyLines.join("\n");return settings.wrapQHtml?["<q-html>",body,"</q-html>"].join("\n"):body}formatContainerStart(){return 'div { style: "position: relative; width: 70vw; height: 70vh; min-width: 420px; min-height: 340px; overflow: hidden;"'}formatEmitterQHtml(emitter){const data=this.factory.read(emitter);const refName=this.sanitizeReferenceName(data["emitter-name"]||emitter.id||"emitter");const lines=[`particle-emitter {`];this.registry.attrs().forEach(attr=>{if(attr==="emitter-name"||attr==="qhtml-unsynced")return;const name=EXPORT_ATTR_NAMES[attr];if(!name)return;const value=data[attr];if(value===undefined||value===null||value==="")return;lines.push(`  ${name}: ${this.formatQHtmlValue(value)}`)});lines.push("}");return lines.join("\n")}formatQHtmlValue(value){const text=String(value);if(/^(true|false)$/i.test(text))return text.toLowerCase();if(text.trim()!==""&&Number.isFinite(Number(text)))return text;return JSON.stringify(text)}sanitizeReferenceName(value){const normalized=String(value||"emitter").replace(/[^A-Za-z0-9_]+/g," ").trim().split(/\s+/).filter(Boolean);if(!normalized.length)return"emitter";const first=normalized[0].replace(/^[^A-Za-z_]+/,"");const parts=[first||"emitter"].concat(normalized.slice(1).map(part=>part.charAt(0).toUpperCase()+part.slice(1)));const joined=parts.join("");return joined||"emitter"}}
      window.addEventListener("DOMContentLoaded",()=>{window.particleEditor=new ParticleEditor()});
